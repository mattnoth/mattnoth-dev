[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Pretty URLs — serve /articles/slug/ as /articles/slug/index.html automatically.
# The [[redirects]] block that previously attempted the same thing has been removed:
# it matched "/*" and rewrote /main.css → /main.css/index.html, conflicting with
# static asset delivery. Netlify's built-in directory index + pretty_urls handles
# clean URLs correctly without a wildcard redirect.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Cache: crawl/index files — short TTL so re-deploys propagate quickly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cache: fonts and images — 1 year immutable
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: CSS and JS (content-hashed by esbuild) — 1 year immutable
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
