[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Pretty URLs — serve index.html for clean paths
[build.processing]
  skip_processing = false

[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  conditions = {Language = [], Country = [], Role = []}
  force = false

# Trailing slash canonical redirect (Netlify built-in)
[build.processing.html]
  pretty_urls = true

# Cache: fonts and images — 1 year immutable
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: CSS and JS (content-hashed by esbuild) — 1 year immutable
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
